<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Downloader Bot</title>
<link rel="stylesheet" href="style.css" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<header class="topbar">
  <span class="topbar-title" id="greeting">Downloader Bot</span>
  <span class="balance" id="balance-chip">
    <span aria-hidden="true">&#128142;</span><b id="balance-value">&mdash;</b>
  </span>
</header>

<main>
  <section class="tab" id="tab-models" hidden>
    <div class="empty">
      <p class="empty-icon" aria-hidden="true">&#10024;</p>
      <h2>Модели АИ</h2>
      <p>Генерация картинок, видео и аудио по категориям появится здесь следующим шагом.</p>
    </div>
  </section>

  <section class="tab" id="tab-download">
    <div class="field">
      <label for="url-input">Ссылка на видео или пост</label>
      <input id="url-input" type="url" inputmode="url" autocomplete="off" placeholder="https://..." />
      <button id="download-btn" class="primary">Скачать</button>
      <p class="hint" id="download-hint">Файл придёт сообщением в чат с ботом. До 500 МБ.</p>
    </div>

    <h2 class="section-title">История</h2>
    <div id="history-list" class="history">
      <p class="muted">Загружаю&hellip;</p>
    </div>
  </section>

  <section class="tab" id="tab-settings" hidden>
    <div class="empty">
      <p class="empty-icon" aria-hidden="true">&#9881;&#65039;</p>
      <h2>Настройки</h2>
      <p>Язык интерфейса и выбор текстовой модели появятся здесь следующим шагом.</p>
    </div>
  </section>
</main>

<nav class="tabbar" role="tablist">
  <button class="tabbar-btn" data-tab="models" role="tab" aria-selected="false">
    <span aria-hidden="true">&#10024;</span>Модели АИ
  </button>
  <button class="tabbar-btn is-active" data-tab="download" role="tab" aria-selected="true">
    <span aria-hidden="true">&#11015;&#65039;</span>Скачивание
  </button>
  <button class="tabbar-btn" data-tab="settings" role="tab" aria-selected="false">
    <span aria-hidden="true">&#9881;&#65039;</span>Настройки
  </button>
</nav>

<script src="app.js"></script>
</body>
</html>
