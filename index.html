<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Downloader Bot</title>
<link rel="stylesheet" href="style.css" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="splash" class="splash">
  <svg class="splash-logo" viewBox="0 0 120 120" aria-hidden="true">
    <defs>
      <linearGradient id="tzGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#a855f7" />
        <stop offset="100%" stop-color="#22d3ee" />
      </linearGradient>
    </defs>
    <circle class="ring" cx="60" cy="60" r="52" fill="none" stroke="url(#tzGrad)" stroke-width="3" />
    <polygon class="hex" points="60,22 93,41 93,79 60,98 27,79 27,41"
             fill="none" stroke="url(#tzGrad)" stroke-width="4" stroke-linejoin="round" />
    <text class="mark" x="60" y="60" text-anchor="middle" dominant-baseline="central">T</text>
  </svg>
  <p class="splash-title">Tazar_AI</p>
  <p class="splash-sub">лучшие ИИ в одном месте</p>
</div>

<header class="topbar">
  <span class="topbar-title" id="greeting">Downloader Bot</span>
  <span class="balance">
    <span aria-hidden="true">&#129689;</span><b id="balance-value">&mdash;</b>
  </span>
</header>

<main>
  <!-- Модели АИ -->
  <section class="tab" id="tab-models">
    <!-- Шаг 1: категории -->
    <div id="screen-categories">
      <div id="category-grid" class="cat-grid"></div>
      <div class="section-head">
        <h2 class="section-title" data-i18n="gen.gallery">Мои генерации</h2>
        <button id="clear-gallery" class="link-btn" data-i18n="gen.clearAll">Очистить всё</button>
      </div>
      <div id="gallery" class="gallery"></div>
    </div>

    <!-- Шаг 2: модели внутри категории -->
    <div id="screen-models" hidden>
      <button class="back-btn" data-back="categories">&larr; <span data-i18n="gen.back">Назад</span></button>
      <h2 class="screen-title" id="models-heading"></h2>
      <div id="model-picker" class="models"></div>
    </div>

    <!-- Шаг 3а: чат с текстовой моделью -->
    <div id="screen-chat" hidden>
      <div class="chat-head">
        <button class="back-btn" data-back="models">&larr; <span data-i18n="gen.backModels">К моделям</span></button>
        <button id="chat-clear" class="link-btn" data-i18n="chat.clear">Очистить</button>
      </div>
      <h2 class="screen-title" id="chat-heading"></h2>
      <p class="screen-sub" id="chat-sub"></p>

      <div id="chat-log" class="chat-log"></div>

      <div class="chat-input">
        <textarea id="chat-text" rows="2" placeholder="..."></textarea>
        <button id="chat-send" class="primary" data-i18n="chat.send">Отправить</button>
      </div>
      <p class="hint" id="chat-hint"></p>
    </div>

    <!-- Шаг 3б: генерация -->
    <div id="screen-generate" hidden>
      <button class="back-btn" data-back="models">&larr; <span data-i18n="gen.backModels">К моделям</span></button>
      <h2 class="screen-title" id="generate-heading"></h2>
      <p class="screen-sub" id="generate-sub"></p>

      <div class="card">
        <div id="image-row" hidden>
          <label for="image-input" data-i18n="gen.image">Исходная картинка</label>
          <input id="image-input" type="file" accept="image/*" />
          <img id="image-preview" alt="" hidden />
        </div>

        <div id="prompt-row">
          <label for="prompt-input" id="prompt-label" data-i18n="gen.prompt">Что сгенерировать</label>
          <textarea id="prompt-input" rows="3" placeholder="..."></textarea>
        </div>

        <div id="lyrics-row" hidden>
          <label for="lyrics-input" data-i18n="gen.lyrics">Текст песни</label>
          <textarea id="lyrics-input" rows="5" placeholder="..."></textarea>
        </div>

        <div id="audio-row" hidden>
          <label for="audio-input" data-i18n="gen.audio">Аудиофайл</label>
          <input id="audio-input" type="file" accept="audio/*" />
        </div>

        <div id="params-row"></div>

        <button id="generate-btn" class="primary" data-i18n="gen.button">Сгенерировать</button>
        <p class="hint" id="generate-hint"></p>
      </div>
    </div>
  </section>

  <!-- Скачивание -->
  <section class="tab" id="tab-download" hidden>
    <div class="field">
      <label for="url-input" data-i18n="dl.label">Ссылка на видео или пост</label>
      <input id="url-input" type="url" inputmode="url" autocomplete="off" placeholder="https://..." />
      <button id="download-btn" class="primary" data-i18n="dl.button">Скачать</button>
      <div id="quality-list" class="qualities" hidden></div>
      <p class="hint" id="download-hint"></p>
    </div>

    <div class="section-head">
      <h2 class="section-title" data-i18n="dl.history">История</h2>
      <button id="clear-history" class="link-btn" data-i18n="gen.clearAll">Очистить всё</button>
    </div>
    <div id="history-list" class="history"></div>
  </section>

  <!-- Настройки -->
  <section class="tab" id="tab-settings" hidden>
    <h2 class="section-title" data-i18n="set.language">Язык</h2>
    <div class="segmented" id="language-group">
      <button data-value="ru">Русский</button>
      <button data-value="en">English</button>
    </div>

    <h2 class="section-title" data-i18n="set.theme">Тема</h2>
    <div class="segmented" id="theme-group">
      <button data-value="system" data-i18n="set.theme.system">Системная</button>
      <button data-value="light" data-i18n="set.theme.light">Светлая</button>
      <button data-value="dark" data-i18n="set.theme.dark">Тёмная</button>
    </div>

    <h2 class="section-title" data-i18n="set.model">Модель в чате с ботом</h2>
    <div id="model-list" class="models"></div>

    <div id="admin-panel" hidden>
      <h2 class="section-title" data-i18n="admin.title">Админ-панель</h2>

      <div id="admin-stats" class="stat-grid"></div>

      <div class="card">
        <b data-i18n="admin.grant">Начислить</b>
        <label for="grant-user" data-i18n="admin.user">ID пользователя</label>
        <input id="grant-user" type="number" inputmode="numeric" placeholder="123456789" />
        <label for="grant-amount" data-i18n="admin.amount">Сколько жетонов</label>
        <input id="grant-amount" type="number" inputmode="numeric" placeholder="100" />
        <button id="grant-btn" class="primary" data-i18n="admin.grant">Начислить</button>
        <button id="grant-self" class="ghost" data-i18n="admin.self">Себе</button>
        <p class="hint" id="grant-hint"></p>
      </div>

      <div class="card">
        <b data-i18n="admin.lookup">Найти пользователя</b>
        <input id="lookup-user" type="number" inputmode="numeric" placeholder="123456789" />
        <button id="lookup-btn" class="ghost" data-i18n="admin.lookupBtn">Показать</button>
        <div id="lookup-result"></div>
      </div>

      <div class="card">
        <b data-i18n="admin.recent">Последние пользователи</b>
        <div id="users-list"></div>
      </div>

      <div class="card">
        <b data-i18n="admin.broadcast">Рассылка всем</b>
        <textarea id="broadcast-text" rows="3" placeholder="..."></textarea>
        <button id="broadcast-btn" class="ghost" data-i18n="admin.broadcastBtn">Отправить всем</button>
        <p class="hint" id="broadcast-hint"></p>
      </div>
    </div>
  </section>
</main>

<nav class="tabbar" role="tablist">
  <button class="tabbar-btn is-active" data-tab="models" role="tab" aria-selected="true">
    <span aria-hidden="true">&#10024;</span><i data-i18n="nav.models">Модели АИ</i>
  </button>
  <button class="tabbar-btn" data-tab="download" role="tab" aria-selected="false">
    <span aria-hidden="true">&#11015;&#65039;</span><i data-i18n="nav.download">Скачивание</i>
  </button>
  <button class="tabbar-btn" data-tab="settings" role="tab" aria-selected="false">
    <span aria-hidden="true">&#9881;&#65039;</span><i data-i18n="nav.settings">Настройки</i>
  </button>
</nav>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
